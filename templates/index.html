<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi IA</title>

<style>
:root {
    --bg: #f2f2f7;
    --text: #111;
    --glass: rgba(255,255,255,0.6);
    --border: rgba(255,255,255,0.4);
    --user: #007aff;
    --ai: rgba(255,255,255,0.4);
}

.dark {
    --bg: #0c0c0c;
    --text: #f2f2f7;
    --glass: rgba(30,30,30,0.6);
    --border: rgba(255,255,255,0.1);
    --user: #0a84ff;
    --ai: rgba(50,50,50,0.4);
}

body {
    margin: 0;
    font-family: -apple-system, system-ui;
    background: var(--bg);
    color: var(--text);
}

.app {
    max-width: 650px;
    margin: auto;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

/* HEADER GLASS */
.header {
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    background: var(--glass);
    border-bottom: 1px solid var(--border);
    padding: 14px;
    display: flex;
    justify-content: space-between;
    font-weight: 600;
}

/* CHAT */
.chat {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
}

/* MENSAJES */
.message {
    display: flex;
    margin-bottom: 14px;
}

.user {
    justify-content: flex-end;
}

.bubble {
    padding: 12px 14px;
    border-radius: 18px;
    max-width: 75%;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
}

.user .bubble {
    background: var(--user);
    color: white;
}

.ai .bubble {
    background: var(--ai);
    border: 1px solid var(--border);
}

/* INPUT GLASS */
.input-area {
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    background: var(--glass);
    border-top: 1px solid var(--border);
    padding: 10px;
    display: flex;
    gap: 8px;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 20px;
    border: none;
    outline: none;
    background: #ffffffcc;
}

.dark input {
    background: #1c1c1e;
    color: white;
}

button {
    border: none;
    background: var(--user);
    color: white;
    padding: 10px 14px;
    border-radius: 20px;
    cursor: pointer;
}

.toggle {
    cursor: pointer;
}

/* loader */
.loader {
    font-size: 13px;
    opacity: 0.6;
    margin-left: 10px;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
    🤖 Mi IA
    <span class="toggle" onclick="toggleModo()">🌙</span>
</div>

<div id="chat" class="chat"></div>

<div id="loader" class="loader" style="display:none;">
    IA escribiendo...
</div>

<div class="input-area">
    <input id="input" placeholder="Escribe..."
        onkeydown="if(event.key==='Enter'){enviar()}">
