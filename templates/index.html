<!DOCTYPE html>
<html>
<head>
    <title>Mi Chat IA</title>
    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }
        #chat p {
            margin: 5px 0;
        }
    </style>
</head>
<body>

<h1>Mi Asistente IA 🤖</h1>

<div id="chat"></div>

<input id="input" placeholder="Escribe algo..." />
<button onclick="enviar()">Enviar</button>

<script>
async function enviar() {
    const input = document.getElementById("input")
    const mensaje = input.value

    const chat = document.getElementById("chat")
    chat.innerHTML += "<p><b>Tú:</b> " + mensaje + "</p>"

    const respuesta = await fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ texto: mensaje })
    })

    const data = await respuesta.json()

    chat.innerHTML += "<p><b>IA:</b> " + data.respuesta + "</p>"

    input.value = ""
}
</script>

</body>
</html>
        messages=[
            {"role": "system", "content": "Eres un asistente útil, claro y técnico."},
