<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi IA</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f2f2f7;
    color: #111;
}

/* APP */
.app {
    max-width: 720px;
    margin: auto;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

/* HEADER */
.header {
    padding: 15px;
    font-weight: 700;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #ddd;
    background: #f2f2f7;
    position: sticky;
    top: 0;
    z-index: 10;
}

.header-actions {
    display: flex;
    gap: 8px;
}

/* CHAT */
.chat {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
}

/* MENSAJES */
.message {
    display: flex;
    margin-bottom: 12px;
    animation: fadeIn 0.25s ease;
}

.user {
    justify-content: flex-end;
}

.ai {
    justify-content: flex-start;
}

.bubble {
    padding: 10px 12px;
    border-radius: 14px;
    max-width: 78%;
    line-height: 1.6;
    white-space: pre-wrap;
    word-wrap: break-word;
    box-sizing: border-box;
}

.user .bubble {
    background: #007aff;
    color: white;
}

.ai .bubble {
    background: #ffffff;
    color: #111;
    border: 1px solid #ececec;
}

/* INPUT */
.input-area {
    display: flex;
    padding: 10px;
    gap: 8px;
    border-top: 1px solid #ddd;
    background: #f2f2f7;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #ccc;
    font-size: 15px;
    box-sizing: border-box;
}

input:focus {
    border-color: #007aff;
    box-shadow: 0 0 0 2px rgba(0,122,255,0.2);
    outline: none;
}

button {
    background: #007aff;
    color: white;
    border: none;
    padding: 10px 14px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 14px;
}

button:active {
    transform: scale(0.96);
}

button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
}

/* LOADER */
.loader {
    font-size: 14px;
    padding: 0 15px 10px 15px;
    opacity: 0.75;
    display: none;
}

/* CURSOR de escritura */
.typing-cursor::after {
    content: "▍";
    margin-left: 2px;
    animation: blink 0.8s infinite;
}

/* ANIMACIONES */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(6px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes blink {
    0% { opacity: 1; }
    50% { opacity: 0.2; }
    100% { opacity: 1; }
}

/* MODO OSCURO */
body.dark {
    background: #0f1115;
    color: #f5f5f5;
}

body.dark .header,
body.dark .input-area {
    background: #0f1115;
    border-color: #262a33;
}

body.dark .ai .bubble {
    background: #1b1f27;
    color: #f5f5f5;
    border: 1px solid #2a2f39;
}

body.dark input {
    background: #171a21;
    color: #fff;
    border-color: #303544;
}

body.dark .chat {
    background: #0f1115;
}

/* RESPONSIVE */
@media (max-width: 640px) {
    .app {
        max-width: 100%;
    }

    .bubble {
        max-width: 88%;
    }

    .header {
        font-size: 16px;
    }

    input {
        font-size: 16px;
    }
}
</style>
</head>

<body>

<div class="app">

    <div class="header">
        <div>🤖 Mi IA</div>
        <div class="header-actions">
            <button onclick="toggleModo()">🌓</button>
            <button onclick="limpiar()">🗑</button>
        </div>
    </div>

    <div id="chat" class="chat"></div>
