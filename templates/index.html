<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi IA</title>

<style>
:root {
    --bg: #f2f2f7;
    --text: #111;
    --user: #007aff;
    --ai: #ffffff;
}

.dark {
    --bg: #0c0c0c;
    --text: #f2f2f7;
    --user: #0a84ff;
    --ai: #1c1c1e;
}

body {
    margin: 0;
    font-family: -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* APP */
.app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 600px;
    margin: auto;
}

/* HEADER */
.header {
    padding: 15px;
    font-weight: bold;
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid #ddd;
}

/* CHAT */
.chat {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
}

/* MENSAJES */
.message {
    display: flex;
    margin-bottom: 12px;
    animation: fadeIn 0.25s ease;
}

.user {
    justify-content: flex-end;
}

.bubble {
    padding: 10px 12px;
    border-radius: 14px;
    max-width: 75%;
}

.user .bubble {
    background: var(--user);
    color: white;
}

.ai .bubble {
    background: var(--ai);
}

/* INPUT */
.input-area {
    display: flex;
    padding: 10px;
    gap: 8px;
    border-top: 1px solid #ddd;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 12px;
    border: 1px solid #ccc;
}

input:focus {
    border-color: #007aff;
    box-shadow: 0 0 0 2px rgba(0,122,255,0.2);
    outline: none;
}

/* BOTÓN */
button {
    background: var(--user);
    color: white;
    border: none;
    padding: 10px 14px;
    border-radius: 12px;
