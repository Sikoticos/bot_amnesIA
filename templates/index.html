<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi IA</title>

<style>
:root {
    --bg: #f2f2f7;
    --text: #111;
    --user: #007aff;
    --ai: #ffffff;
}

.dark {
    --bg: #0c0c0c;
    --text: #f2f2f7;
    --user: #0a84ff;
    --ai: #1c1c1e;
}

body {
    margin: 0;
    font-family: -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
}

.app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 600px;
    margin: auto;
}

.header {
    padding: 15px;
    font-weight: bold;
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid #ddd;
}

.chat {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
}

.message {
    display: flex;
    margin-bottom: 12px;
}

.user {
    justify-content: flex-end;
}

.bubble {
    padding: 10px 12px;
    border-radius: 14px;
    max-width: 75%;
}

.user .bubble {
    background: var(--user);
    color: white;
}

.ai .bubble {
    background: var(--ai);
}

.input-area {
    display: flex;
    padding: 10px;
    gap: 8px;
    border-top: 1px solid #ddd;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 12px;
    border: 1px solid #ccc;
}

button {
    background: var(--user);
    color: white;
    border: none;
    padding: 10px 14px;
    border-radius: 12px;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="app">

<div class="header">
    🤖 Mi IA
    <button onclick="toggleModo()">🌓</button>
</div>

<div id="chat" class="chat"></div>

<div class="input-area">
    <input id="input" placeholder="Escribe..." onkeydown="if(event.key==='Enter'){enviar()}">
    <button onclick="enviar()">Enviar</button>
</div>

</div>

<script>
const chat = document.getElementById("chat")

// modo oscuro automático
if(window.matchMedia("(prefers-color-scheme: dark)").matches){
    document.body.classList.add("dark")
}

function toggleModo(){
    document.body.classList.toggle("dark")
}

// memoria
function getHist(){
    return JSON.parse(localStorage.getItem("chat") || "[]")
}

function setHist(h){
    localStorage.setItem("chat", JSON.stringify(h))
}

function render(){
    const h = getHist()

    chat.innerHTML = h.map(m => `
        <div class="message ${m.role === "user" ? "user" : "ai"}">
            <div class="bubble">${m.content}</div>
        </div>
    `).join("")

    chat.scrollTop = chat.scrollHeight
}

async function enviar(){

    const input = document.getElementById("input")
    const texto = input.value.trim()
    if(!texto) return

    input.value = ""

    const hist = getHist()

    hist.push({role: "user", content: texto})
    setHist(hist)

    render()

    try{
        const res = await fetch("/chat", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
                texto: texto,
                historial: hist
            })
        })

        const data = await res.json()

        hist.push({
            role: "assistant",
            content: data.respuesta || "Error en respuesta"
        })

    } catch(e){
        hist.push({
            role: "assistant",
            content: "Error conectando con la IA"
        })
    }

    setHist(hist)
    render()
}

render()
</script>

</body>
</html>
