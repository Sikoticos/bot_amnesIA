<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mi IA</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, sans-serif;
    background: #f2f2f7;
}

.app {
    max-width: 600px;
    margin: auto;
    display: flex;
    flex-direction: column;
    height: 100dvh;
}

.header {
    padding: 15px;
    font-weight: bold;
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid #ddd;
    background: white;
}

.chat {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
}

.message {
    display: flex;
    margin-bottom: 12px;
}

.user {
    justify-content: flex-end;
}

.bubble {
    padding: 10px 12px;
    border-radius: 14px;
    max-width: 75%;
    line-height: 1.6;
    white-space: pre-wrap;
}

.user .bubble {
    background: #007aff;
    color: white;
}

.ai .bubble {
    background: white;
}

/* 🔥 BLOQUES DE CÓDIGO */
.code-block {
    background: #111;
    color: #0f0;
    padding: 10px;
    border-radius: 10px;
    margin-top: 8px;
    font-family: monospace;
    position: relative;
}

.copy-btn {
    position: absolute;
    top: 5px;
    right: 5px;
    background: #333;
    color: white;
    border: none;
    padding: 5px 8px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
}

/* INPUT */
.input-area {
    display: flex;
    padding: 10px;
    gap: 8px;
    border-top: 1px solid #ddd;
    background: white;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #ccc;
}

button {
    background: #007aff;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 12px;
}

.loader {
    padding-left: 15px;
    font-size: 14px;
    opacity: 0.7;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
    🤖 Mi IA
    <button onclick="limpiar()">🗑</button>
</div>

<div id="chat" class="chat"></div>

<div id="loader" class="loader" style="display:none;">
    IA escribiendo...
</div>

<div class="input-area">
    <input id="input" placeholder="Escribe..." onkeydown="if(event.key=='Enter'){enviar()}">
    <button onclick="enviar()">Enviar</button>
</div>

</div>

<script>

var chat = document.getElementById("chat");
var loader = document.getElementById("loader");

function getHist(){
    return JSON.parse(localStorage.getItem("chat") || "[]");
}

function setHist(h){
    localStorage.setItem("chat", JSON.stringify(h));
}

/* 🔥 DETECTAR BLOQUES DE CÓDIGO */
function formatMessage(text){

    if(text.includes("```")){
        var parts = text.split("```");

        var result = "";

        for(let i=0;i<parts.length;i++){

            if(i % 2 == 1){
                result += `
                <div class="code-block">
                    <button class="copy-btn" onclick="copiar(this)">Copiar</button>
                    <pre>${escapeHTML(parts[i])}</pre>
                </div>
                `;
            } else {
                result += `<div>${escapeHTML(parts[i])}</div>`;
            }
        }

        return result;
    }

    return escapeHTML(text);
}

function escapeHTML(text){
    return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
}

/* copiar */
function copiar(btn){
    var texto = btn.parentElement.innerText.replace("Copiar", "");
    navigator.clipboard.writeText(texto);
    btn.innerText = "Copiado ✅";
    setTimeout(()=>btn.innerText="Copiar",1000);
}

/* render */
function render(){

    var h = getHist();
    chat.innerHTML = "";

    for(var i=0;i<h.length;i++){

        var div = document.createElement("div");
        div.className = "message " + (h[i].role === "user" ? "user":"ai");

        var bubble = document.createElement("div");
        bubble.className = "bubble";

        bubble.innerHTML = formatMessage(h[i].content);

        div.appendChild(bubble);
        chat.appendChild(div);
    }

    chat.scrollTop = chat.scrollHeight;
}

/* animación */
async function typeWriter(text){

    var div = document.createElement("div");
    div.className = "message ai";

    var bubble = document.createElement("div");
    bubble.className = "bubble";

    div.appendChild(bubble);
    chat.appendChild(div);

    var hist = getHist();
    hist.push({role:"assistant", content:""});
    setHist(hist);

    let current = "";

    for(let i=0;i<text.length;i++){

        current += text[i];

        bubble.innerHTML = escapeHTML(current);

        hist[hist.length - 1].content = current;
        setHist(hist);

        chat.scrollTop = chat.scrollHeight;

        let delay = 8;
        if(text[i] === "." || text[i] === ",") delay = 25;

        await new Promise(r => setTimeout(r, delay));
    }

    bubble.innerHTML = formatMessage(text);
}

/* enviar */
async function enviar(){

    var input = document.getElementById("input");
    var texto = input.value.trim();

    if(!texto) return;

    input.value = "";

    var hist = getHist();

    hist.push({role:"user", content:texto});
    setHist(hist);

    render();

    loader.style.display = "block";

    try {
        var res = await fetch("/chat",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
                texto:texto,
                historial:hist
            })
        });

        var data = await res.json();

        loader.style.display = "none";

        await typeWriter(data.respuesta || "Error");

    } catch(e){
        loader.style.display = "none";
        console.log(e);
    }
}

function limpiar(){
    localStorage.removeItem("chat");
    render();
}

render();

</script>

</body>
</html>
``
