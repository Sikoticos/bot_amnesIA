<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mi IA</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, sans-serif;
    background: #f2f2f7;
}

/* APP */
.app {
    max-width: 650px;
    margin: auto;
    display: flex;
    flex-direction: column;
    height: 100dvh;
}

/* HEADER */
.header {
    padding: 15px;
    font-weight: bold;
    display: flex;
    justify-content: space-between;
    background: white;
    border-bottom: 1px solid #ddd;
}

/* CHAT */
.chat {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
}

/* MENSAJES */
.message {
    display: flex;
    margin-bottom: 12px;
}

.user {
    justify-content: flex-end;
}

.bubble {
    padding: 12px;
    border-radius: 14px;
    max-width: 80%;
    line-height: 1.6;
    white-space: pre-wrap;
}

.user .bubble {
    background: #007aff;
    color: white;
}

.ai .bubble {
    background: white;
}

/* 🧠 BLOQUES DE CÓDIGO estilo ChatGPT */
.code-container {
    background: #f6f8fa;
    border: 1px solid #e1e4e8;
    border-radius: 10px;
    margin-top: 10px;
    overflow: hidden;
}

.code-header {
    display: flex;
    justify-content: space-between;
    padding: 6px 10px;
    font-size: 12px;
    background: #eee;
    color: #555;
}

.code-header button {
    border: none;
    background: #ddd;
    padding: 4px 8px;
    border-radius: 6px;
    cursor: pointer;
}

pre {
    margin: 0;
    padding: 12px;
    overflow-x: auto;
    font-family: monospace;
    font-size: 13px;
}

/* INPUT */
.input-area {
    display: flex;
    padding: 10px;
    gap: 8px;
    border-top: 1px solid #ddd;
    background: white;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #ccc;
}

button {
    background: #007aff;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 12px;
}

.loader {
    padding-left: 15px;
    font-size: 14px;
    opacity: 0.7;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
    🤖 Mi IA
    <button onclick="limpiar()">🗑</button>
</div>

<div id="chat" class="chat"></div>

<div id="loader" class="loader" style="display:none;">
    IA escribiendo...
</div>

<div class="input-area">
    <input id="input" placeholder="Escribe..." onkeydown="if(event.key=='Enter'){enviar()}">
    <button onclick="enviar()">Enviar</button>
</div>

</div>

<script>

var chat = document.getElementById("chat");
var loader = document.getElementById("loader");

/* memoria */
function getHist(){
    return JSON.parse(localStorage.getItem("chat") || "[]");
}

function setHist(h){
    localStorage.setItem("chat", JSON.stringify(h));
}

/* 🔥 FORMATO CHATGPT */
function formatMessage(text){

    if(text.includes("```")){
        let parts = text.split("```");
        let html = "";

        for(let i=0;i<parts.length;i++){

            if(i % 2 === 1){

                html += `
                <div class="code-container">
                    <div class="code-header">
                        Código
                        <button onclick="copiar(this)">Copiar</button>
                    </div>
                    <pre>${escapeHTML(parts[i])}</pre>
                </div>
                `;

            } else {
                html += "<div>" + escapeHTML(parts[i]) + "</div>";
            }
        }

        return html;
    }

    return escapeHTML(text);
}

/* seguridad */
function escapeHTML(t){
    return t.replace(/&/g,"&amp;")
            .replace(/</g,"&lt;")
            .replace(/>/g,"&gt;");
}

/* copiar */
function copiar(btn){
    let texto = btn.parentElement.nextElementSibling.innerText;
    navigator.clipboard.writeText(texto);
    btn.innerText = "Copiado ✅";
    setTimeout(()=>btn.innerText="Copiar",1000);
}

/* render */
function render(){
    var h = getHist();
    chat.innerHTML = "";

    for(let m of h){

        let div = document.createElement("div");
        div.className = "message " + (m.role === "user" ? "user" : "ai");

        let bubble = document.createElement("div");
        bubble.className = "bubble";

        bubble.innerHTML = formatMessage(m.content);

        div.appendChild(bubble);
        chat.appendChild(div);
    }

    chat.scrollTop = chat.scrollHeight;
}

/* ✅ animación fluida SIN BUG */
async function typeWriter(text){

    let div = document.createElement("div");
    div.className = "message ai";

    let bubble = document.createElement("div");
    bubble.className = "bubble";

    div.appendChild(bubble);
    chat.appendChild(div);

    let hist = getHist();
    hist.push({role:"assistant", content:""});
    setHist(hist);

    let current = "";

    for(let i=0;i<text.length;i++){

        current += text[i];

        bubble.innerText = current;

        hist[hist.length - 1].content = current;
        setHist(hist);

        chat.scrollTop = chat.scrollHeight;

        await new Promise(r => setTimeout(r, 8));
    }

    bubble.innerHTML = formatMessage(text);
}

/* enviar */
async function enviar(){

    let input = document.getElementById("input");
    let texto = input.value.trim();
    if(!texto) return;

    input.value = "";

    let hist = getHist();

    hist.push({role:"user",content:texto});
    setHist(hist);

    render();

    loader.style.display = "block";

    try{
        let res = await fetch("/chat",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
                texto,
                historial:hist
            })
        });

        let data = await res.json();

        loader.style.display = "none";

        await typeWriter(data.respuesta || "Error");

    } catch(e){
        loader.style.display = "none";
        console.log(e);
    }
}

function limpiar(){
    localStorage.removeItem("chat");
    render();
}

render();

</script>

</body>
</html>
