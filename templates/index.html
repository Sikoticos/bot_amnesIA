<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistente IA</title>

<style>
body {
    margin: 0;
    background: #f7f7f8;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

.app {
    max-width: 700px;
    margin: auto;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

.header {
    padding: 15px;
    font-weight: bold;
    font-size: 18px;
    background: white;
    border-bottom: 1px solid #e5e7eb;
}

.chat {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
}

.message {
    display: flex;
    margin-bottom: 15px;
}

.user {
    justify-content: flex-end;
}

.bubble {
    max-width: 75%;
    padding: 12px 14px;
    border-radius: 16px;
    line-height: 1.5;
    font-size: 15px;
}

.user .bubble {
    background: #2563eb;
    color: white;
    border-bottom-right-radius: 4px;
}

.ai .bubble {
    background: #ffffff;
    border: 1px solid #e5e7eb;
    border-bottom-left-radius: 4px;
}

.input-area {
    display: flex;
    gap: 10px;
    padding: 15px;
    background: white;
    border-top: 1px solid #e5e7eb;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #d1d5db;
    font-size: 14px;
}

button {
    background: #2563eb;
    color: white;
    border: none;
    padding: 12px 16px;
    border-radius: 12px;
    cursor: pointer;
}

.loader {
    font-size: 14px;
    color: #6b7280;
    margin-top: 5px;
}
</style>

</head>
<body>

<div class="app">

<div class="header">
    🤖 Mi Asistente IA
</div>

<div id="chat" class="chat"></div>

<div id="loader" class="loader" style="display:none;">
    IA está escribiendo...
</div>

<div class="input-area">
    <input id="input" placeholder="Escribe algo..." onkeydown="if(event.key==='Enter'){enviar()}">
    <button onclick="enviar()">Enviar</button>
</div>

</div>

<script>

const chat = document.getElementById("chat")
const loader = document.getElementById("loader")

function guardar(historial){
    localStorage.setItem("chat", JSON.stringify(historial))
}

function cargar(){
    return JSON.parse(localStorage.getItem("chat") || "[]")
}

function render(){

    const historial = cargar()

    chat.innerHTML = historial.map(m => `
        <div class="message ${m.role === "user" ? "user" : "ai"}">
            <div class="bubble">${m.content}</div>
        </div>
    `).join("")

    chat.scrollTop = chat.scrollHeight
}

async function enviar(){

    const input = document.getElementById("input")
    const texto = input.value.trim()

    if(!texto) return

    input.value = ""

    const historial = cargar()

    historial.push({ role: "user", content: texto })
    guardar(historial)

    render()

    loader.style.display = "block"

    const res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            texto,
            historial
        })
    })

    const data = await res.json()

    historial.push({ role: "assistant", content: data.respuesta })
    guardar(historial)

    loader.style.display = "none"

    render()
}

// primera carga
render()

</script>

</body>
</html>
