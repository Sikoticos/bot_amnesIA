<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi IA</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, sans-serif;
    background: #f2f2f7;
}

/* APP */
.app {
    max-width: 600px;
    margin: auto;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

/* HEADER */
.header {
    padding: 15px;
    font-weight: bold;
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid #ddd;
}

/* CHAT */
.chat {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
}

/* MENSAJES */
.message {
    display: flex;
    margin-bottom: 12px;
    animation: fadeIn 0.25s ease;
}

.user {
    justify-content: flex-end;
}

.bubble {
    padding: 10px 12px;
    border-radius: 14px;
    max-width: 75%;
    line-height: 1.6;
    white-space: pre-wrap;
    word-wrap: break-word;
}

.user .bubble {
    background: #007aff;
    color: white;
}

.ai .bubble {
    background: #ffffff;
}

/* INPUT */
.input-area {
    display: flex;
    padding: 10px;
    gap: 8px;
    border-top: 1px solid #ddd;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 12px;
    border: 1px solid #ccc;
}

input:focus {
    border-color: #007aff;
    box-shadow: 0 0 0 2px rgba(0,122,255,0.2);
    outline: none;
}

/* BOTÓN */
button {
    background: #007aff;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 12px;
    cursor: pointer;
}

button:active {
    transform: scale(0.95);
}

/* LOADER */
.loader {
    font-size: 14px;
    padding: 10px;
    opacity: 0.7;
}

/* ANIMACIÓN */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(6px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<div class="app">

<div class="header">
    🤖 Mi IA
    <button onclick="limpiar()">🗑</button>
</div>

<div id="chat" class="chat"></div>

<div id="loader" class="loader" style="display:none;">
    IA escribiendo...
</div>

<div class="input-area">
    <input id="input" placeholder="Pregúntame lo que quieras..."
        onkeydown="if(event.key=='Enter'){enviar()}">
    <button onclick="enviar()">Enviar</button>
</div>

</div>

<script>

// ELEMENTOS
var chat = document.getElementById("chat");
var loader = document.getElementById("loader");

// MEMORIA
function getHist(){
    var data = localStorage.getItem("chat");
    if(!data) return [];
    return JSON.parse(data);
}

function setHist(h){
    localStorage.setItem("chat", JSON.stringify(h));
}

// RENDER
function render(){

    var h = getHist();
    chat.innerHTML = "";

    for(var i=0; i<h.length; i++){

        var div = document.createElement("div");
        div.className = "message " + (h[i].role === "user" ? "user" : "ai");

        var bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.textContent = h[i].content;

        div.appendChild(bubble);
        chat.appendChild(div);
    }

    chat.scrollTop = chat.scrollHeight;
}

// ENVIAR
async function enviar(){

    var input = document.getElementById("input");
    var texto = input.value.trim();

    if(!texto) return;

    input.value = "";

    var hist = getHist();

    hist.push({role:"user", content:texto});
    setHist(hist);

    render();

    loader.style.display = "block";

    try{

        var res = await fetch("/chat", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
                texto: texto,
                historial: hist
            })
        });

        var data = await res.json();

        hist.push({
            role:"assistant",
            content: data.respuesta || "Error"
        });

    } catch(e){

        hist.push({
            role:"assistant",
            content:"⚠️ Error conectando con la IA"
        });

        console.log("ERROR:", e);
    }

    setHist(hist);

    loader.style.display = "none";

    render();
}

// LIMPIAR CHAT
function limpiar(){
    localStorage.removeItem("chat");
    render();
}

// INICIO
render();

</script>

</body>
</html>
