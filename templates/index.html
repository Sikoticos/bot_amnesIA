<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi IA</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, sans-serif;
    background: #f2f2f7;
}

.app {
    max-width: 600px;
    margin: auto;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

.header {
    padding: 15px;
    font-weight: bold;
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid #ddd;
}

.chat {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
}

/* animación */
.message {
    display: flex;
    margin-bottom: 12px;
    animation: fadeIn 0.25s ease;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(6px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.user {
    justify-content: flex-end;
}

.bubble {
    padding: 10px;
    border-radius: 14px;
    max-width: 75%;
}

.user .bubble {
    background: #007aff;
    color: white;
}

.ai .bubble {
    background: #ffffff;
}

/* input */
.input-area {
    display: flex;
    padding: 10px;
    gap: 8px;
    border-top: 1px solid #ddd;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 12px;
    border: 1px solid #ccc;
}

button {
    background: #007aff;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 12px;
}

/* loader */
.loader {
    font-size: 14px;
    padding-left: 10px;
}
</style>

</head>

<body>

<div class="app">

<div class="header">
    🤖 Mi IA
</div>

<div id="chat" class="chat"></div>

<div id="loader" class="loader" style="display:none;">
    IA escribiendo...
</div>

<div class="input-area">
    <input id="input" placeholder="Escribe..." onkeydown="if(event.key=='Enter'){enviar()}">
    <button onclick="enviar()">Enviar</button>
</div>

</div>

<script>

var chat = document.getElementById("chat");
var loader = document.getElementById("loader");

// memoria
function getHist(){
    var data = localStorage.getItem("chat");
    if(!data) return [];
    return JSON.parse(data);
}

function setHist(h){
    localStorage.setItem("chat", JSON.stringify(h));
}

// render seguro
function render(){
    var h = getHist();
    chat.innerHTML = "";

    for(var i=0;i<h.length;i++){

        var div = document.createElement("div");
        div.className = "message " + (h[i].role === "user" ? "user" : "ai");

        var bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.textContent = h[i].content;

        div.appendChild(bubble);
        chat.appendChild(div);
    }

    chat.scrollTop = chat.scrollHeight;
}
