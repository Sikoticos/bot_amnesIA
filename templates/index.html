<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mi IA</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, sans-serif;
    background: #f2f2f7;
}

.app {
    max-width: 600px;
    margin: auto;
    display: flex;
    flex-direction: column;
    height: 100dvh;
}

.header {
    padding: 15px;
    font-weight: bold;
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid #ddd;
    background: white;
}

.chat {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
}

.message {
    display: flex;
    margin-bottom: 12px;
}

.user {
    justify-content: flex-end;
}

.bubble {
    padding: 10px 12px;
    border-radius: 14px;
    max-width: 75%;
    line-height: 1.6;
    white-space: pre-wrap;
}

.user .bubble {
    background: #007aff;
    color: white;
}

.ai .bubble {
    background: white;
}

.input-area {
    display: flex;
    padding: 10px;
    gap: 8px;
    border-top: 1px solid #ddd;
    background: white;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #ccc;
}

button {
    background: #007aff;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 12px;
}

.loader {
    padding-left: 15px;
    font-size: 14px;
    opacity: 0.7;
}
</style>

</head>

<body>

<div class="app">

<div class="header">
    🤖 Mi IA
    <button onclick="limpiar()">🗑</button>
</div>

<div id="chat" class="chat"></div>

<div id="loader" class="loader" style="display:none;">
    IA escribiendo...
</div>

<div class="input-area">
    <input id="input" placeholder="Escribe..." onkeydown="if(event.key=='Enter'){enviar()}">
    <button onclick="enviar()">Enviar</button>
</div>

</div>

<script>

var chat = document.getElementById("chat");
var loader = document.getElementById("loader");

function getHist(){
    var data = localStorage.getItem("chat");
    return data ? JSON.parse(data) : [];
}

function setHist(h){
    localStorage.setItem("chat", JSON.stringify(h));
}

function render(){
    var h = getHist();
    chat.innerHTML = "";

    for(var i=0;i<h.length;i++){

        var div = document.createElement("div");
        div.className = "message " + (h[i].role === "user" ? "user" : "ai");

        var bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.textContent = h[i].content;

        div.appendChild(bubble);
        chat.appendChild(div);
    }

    chat.scrollTop = chat.scrollHeight;
}

/* ✅ ANIMACIÓN REAL SIN BLOQUEO */
async function typeWriter(text){

    var div = document.createElement("div");
    div.className = "message ai";

    var bubble = document.createElement("div");
    bubble.className = "bubble";

    div.appendChild(bubble);
    chat.appendChild(div);

    var hist = getHist();
    hist.push({role:"assistant", content:""});
    setHist(hist);

    let current = "";

    for(let i=0;i<text.length;i++){

        current += text[i];
        bubble.textContent = current;

        // actualizar SOLO el último mensaje
        hist[hist.length - 1].content = current;
        setHist(hist);

        // ✅ SCROLL FORZADO (clave para evitar “lag visual”)
        chat.scrollTop = chat.scrollHeight;

        let delay = 8;

        if(text[i] === "." || text[i] === ",") delay = 30;
        if(text[i] === "\n") delay = 20;

        await new Promise(r => setTimeout(r, delay));
    }
}

async function enviar(){

    var input = document.getElementById("input");
    var texto = input.value.trim();

    if(!texto) return;

    input.value = "";

    var hist = getHist();

    hist.push({role:"user",content:texto});
    setHist(hist);

    render();

    loader.style.display = "block";

    try {
        var res = await fetch("/chat",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
                texto:texto,
                historial:hist
            })
        });

        var data = await res.json();

        loader.style.display = "none";

        await typeWriter(data.respuesta || "Error");

    } catch(e){
        loader.style.display = "none";
        console.log(e);
    }
}

function limpiar(){
    localStorage.removeItem("chat");
    render();
}

render();

</script>

</body>
</html>
