<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mi IA</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f8f8f8;
}

/* APP */
.app {
    max-width: 700px;
    margin: auto;
    height: 100dvh;
    display: flex;
    flex-direction: column;
}

/* HEADER */
.header {
    padding: 15px;
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid #e5e5e5;
    background: white;
    font-weight: 600;
}

/* CHAT */
.chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
}

/* MENSAJES */
.message {
    margin-bottom: 16px;
    display: flex;
}

.user { justify-content: flex-end; }

.bubble {
    max-width: 80%;
    padding: 12px;
    border-radius: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
}

.user .bubble {
    background: #007aff;
    color: white;
}

.ai .bubble {
    background: white;
    border: 1px solid #e5e5e5;
}

/* 🔥 BLOQUE CÓDIGO CHATGPT */
.code-wrapper {
    margin-top: 10px;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #e5e5e5;
    background: #f7f7f7;
}

.code-header {
    display: flex;
    justify-content: space-between;
    padding: 8px 12px;
    font-size: 12px;
    color: #555;
    background: #f0f0f0;
}

.copy-btn {
    border: none;
    background: #e0e0e0;
    padding: 3px 8px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
}

pre {
    margin: 0;
    padding: 12px;
    font-family: monospace;
    font-size: 13px;
    overflow-x: auto;
}

/* INPUT */
.input-area {
    display: flex;
    padding: 12px;
    gap: 8px;
    border-top: 1px solid #e5e5e5;
    background: white;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #ccc;
}

button {
    background: #007aff;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 12px;
    cursor: pointer;
}

/* loader */
.loader {
    padding-left: 20px;
    font-size: 14px;
    color: #666;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
    🤖 Mi IA
    <button onclick="limpiar()">🗑</button>
</div>

<div id="chat" class="chat"></div>

<div id="loader" class="loader" style="display:none;">
    IA escribiendo...
</div>

<div class="input-area">
    <input id="input" placeholder="Escribe..." onkeydown="if(event.key=='Enter'){enviar()}">
    <button onclick="enviar()">Enviar</button>
</div>

</div>

<script>

var chat = document.getElementById("chat");

function getHist(){
    return JSON.parse(localStorage.getItem("chat") || "[]");
}

function setHist(h){
    localStorage.setItem("chat", JSON.stringify(h));
}

/* 🔥 FORMATO CHATGPT REAL */
function formatMessage(text){

    if(text.includes("```")){

        let parts = text.split("```");
        let html = "";

        for(let i=0;i<parts.length;i++){

            if(i % 2 == 1){

                let code = parts[i].trim();
                let lang = code.split("\n")[0];

                html += `
                <div class="code-wrapper">
                    <div class="code-header">
                        ${lang || "Código"}
                        <button class="copy-btn" onclick="copiar(this)">Copiar</button>
                    </div>
                    <pre>${escapeHTML(code)}</pre>
                </div>
                `;

            } else {
                html += "<div>" + escapeHTML(parts[i]) + "</div>";
            }
        }

        return html;
    }

    return escapeHTML(text);
}

function escapeHTML(text){
    return text.replace(/&/g,"&amp;")
               .replace(/</g,"&lt;")
               .replace(/>/g,"&gt;");
}

function copiar(btn){
    var texto = btn.parentElement.nextElementSibling.innerText;
    navigator.clipboard.writeText(texto);
    btn.innerText = "Copiado ✅";
    setTimeout(()=>btn.innerText="Copiar",1000);
}

function render(){
    var h = getHist();
    chat.innerHTML = "";

    for(let m of h){

        let div = document.createElement("div");
        div.className = "message " + (m.role === "user" ? "user":"ai");

        let bubble = document.createElement("div");
        bubble.className = "bubble";

        bubble.innerHTML = formatMessage(m.content);

        div.appendChild(bubble);
        chat.appendChild(div);
    }

    chat.scrollTop = chat.scrollHeight;
}

/* animación */
async function typeWriter(text){

    let div = document.createElement("div");
    div.className = "message ai";

    let bubble = document.createElement("div");
    bubble.className = "bubble";

    div.appendChild(bubble);
    chat.appendChild(div);

    let hist = getHist();
    hist.push({role:"assistant",content:""});
    setHist(hist);

    let current = "";

    for(let i=0;i<text.length;i++){
        current += text[i];
        bubble.innerText = current;
        await new Promise(r => setTimeout(r, 8));
    }

    bubble.innerHTML = formatMessage(text);
}

async function enviar(){

    let input = document.getElementById("input");
    let texto = input.value.trim();
    if(!texto) return;

    input.value = "";

    let hist = getHist();

    hist.push({role:"user",content:texto});
    setHist(hist);

    render();

    document.getElementById("loader").style.display = "block";

    try{
        let res = await fetch("/chat",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
                texto,
                historial:hist
            })
        });

        let data = await res.json();

        document.getElementById("loader").style.display = "none";

        await typeWriter(data.respuesta || "Error");

    } catch(e){
        console.log(e);
    }
}

function limpiar(){
    localStorage.removeItem("chat");
    render();
}

render();

</script>

</body>
</html>
